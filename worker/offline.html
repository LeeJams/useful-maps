<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Service Worker Lab</title>
    <link rel="stylesheet" href="/app.v6.css" />
    <style>
      .offline-page {
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }

      .offline-card {
        max-width: 620px;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 28px;
        background: #ffffff;
        box-shadow: var(--shadow);
      }

      .offline-card h1 {
        margin: 0 0 12px;
        font-size: 30px;
      }

      .offline-card p {
        margin: 0 0 16px;
        color: var(--muted);
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main class="offline-page">
      <section class="offline-card">
        <h1>Offline Fallback</h1>
        <p>
          네트워크가 끊긴 상태에서 페이지 이동이 실패하면, 서비스 워커가 미리 캐싱해 둔
          <code>/offline.html</code>을 대신 보여줍니다.
        </p>
        <p>
          지금 보고 있는 이 페이지 자체가 네트워크가 아닌 <strong>Cache Storage에서 나온 응답</strong>입니다.
        </p>
        <a class="primary-button" href="/" style="display: inline-grid; place-items: center; text-decoration: none">Back to Lab</a>
      </section>
    </main>
  </body>
</html>
